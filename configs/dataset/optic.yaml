# Retinal fundus optic disc / PPA segmentation dataset
#
# mask_dir options:
#   masks_semantic  →  3-class (0=background, 1=optic_disc, 2=ppa)
#   masks_od        →  binary  (0=background, 1=optic_disc)
#   masks_ppa       →  binary  (0=background, 1=ppa)
#
# mask_mode:
#   index   → mask pixels are class indices (0,1,2,...)   ← use for masks_semantic
#   binary  → mask pixels are {0,255}, auto-converted to {0,1} ← use for masks_od/ppa
name: optic
root: demo-dataset
mask_dir: masks_semantic
mask_mode: index
num_classes: 3
class_names: [background, optic_disc, ppa]
# Foreground class indices used to compute mean Dice/IoU (excludes background)
foreground_classes: [1, 2]
